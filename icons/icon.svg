<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bird-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#e67600"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glow ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.3"/>
  <!-- Bird body -->
  <ellipse cx="256" cy="256" rx="85" ry="70" fill="url(#bird-body)"/>
  <!-- Wing -->
  <ellipse cx="225" cy="270" rx="50" ry="30" fill="url(#wing)" transform="rotate(-15 225 270)"/>
  <!-- Eye white -->
  <circle cx="295" cy="235" r="22" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="300" cy="235" r="12" fill="#1a1a2e"/>
  <!-- Eye highlight -->
  <circle cx="304" cy="230" r="5" fill="white"/>
  <!-- Beak -->
  <polygon points="330,255 370,265 330,275" fill="#ff4444"/>
  <!-- Tail feathers -->
  <polygon points="175,240 145,220 170,255" fill="#e67600" opacity="0.8"/>
  <polygon points="175,260 140,265 170,270" fill="#e67600" opacity="0.6"/>
  <!-- Title text -->
  <text x="256" y="420" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="6">FLAPPY</text>
  <!-- Subtle stars -->
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.5"/>
  <circle cx="400" cy="80" r="2" fill="white" opacity="0.4"/>
  <circle cx="80" cy="180" r="2" fill="white" opacity="0.3"/>
  <circle cx="420" cy="160" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="150" cy="420" r="2" fill="white" opacity="0.3"/>
  <circle cx="380" cy="400" r="3" fill="white" opacity="0.4"/>
</svg>